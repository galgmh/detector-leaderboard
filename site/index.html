<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI Detector Benchmark Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-container">
        <img src="photo/logo.png" alt="Logo" class="logo">
        <h1>🏆 AI Detector Benchmark</h1>
    </div>

    <div class="description-section">
        <p>欢迎来到 <strong>AI Detector Benchmark</strong>。本项目旨在评估当前最前沿的 AI 生成文本检测器在不同数据集（如 Wiki, Arxiv）上的表现。</p>
        <ul>
            <li><strong>AUC:</strong> 衡量模型区分真伪文本的综合能力。</li>
            <li><strong>F1 Score:</strong> 查准率与查全率的调和平均数。</li>
        </ul>
        <p>想要添加你的模型？请提交 Pull Request 或查看底部的代码仓库。</p>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="搜索模型或组织..." oninput="filterData()">
        <select id="datasetFilter" onchange="filterData()">
            <option value="all">所有数据集</option>
            <option value="Wiki">Wiki</option>
            <option value="Arxiv">Arxiv</option>
        </select>
    </div>

    <table id="leaderboard">
        <thead>
            <tr>
                <th>排名</th>
                <th onclick="sortTable('detector')">检测器</th>
                <th onclick="sortTable('organization')">组织</th>
                <th onclick="sortTable('AUC')">AUC ▽</th>
                <th onclick="sortTable('F1')">F1 ▽</th>
                <th>数据集</th>
                <th>论文</th>
                <th>代码</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
